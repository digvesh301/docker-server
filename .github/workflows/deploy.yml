name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: project-57b481f9-2513-4a16-ae4

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔐 Authenticate using Workload Identity
      - id: 'auth'
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          # Note: Added 'token_format: access_token' to help Docker auth
          token_format: 'access_token' 
          workload_identity_provider: projects/943086588341/locations/global/workloadIdentityPools/docker-server-git/providers/github
          service_account: github-cicd@project-57b481f9-2513-4a16-ae4.iam.gserviceaccount.com

      # 🛠 Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🔑 Configure Docker auth (Specific to GCR)
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # 🐳 Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          # FIX: Tag name must match the push name exactly
          docker build -t gcr.io/${{ env.PROJECT_ID }}/frontend:latest ./frontend
          docker push gcr.io/${{ env.PROJECT_ID }}/frontend:latest

      # 🐳 Build & Push Backend
      - name: Build and Push Backend
        run: |
          # FIX: Tag name must match the push name exactly
          docker build -t gcr.io/${{ env.PROJECT_ID }}/backend:latest ./backend
          docker push gcr.io/${{ env.PROJECT_ID }}/backend:latest

      # 🚀 Deploy to VM
      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.GCP_SSH_HOST }}
          username: ${{ secrets.GCP_SSH_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # Ensure the VM is also authenticated to GCR to pull images
            gcloud auth configure-docker gcr.io --quiet
            docker pull gcr.io/project-57b481f9-2513-4a16-ae4/frontend:latest
            docker pull gcr.io/project-57b481f9-2513-4a16-ae4/backend:latest
            # If your docker-compose.yml uses these GCR tags, this will work:
            docker-compose up -d